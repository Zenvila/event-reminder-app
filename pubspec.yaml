name: eventora_planner
description: "Eventora Planner - Local Storage Version"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0
  badges: ^3.1.2
  font_awesome_flutter: ^10.8.0
  intl: ^0.20.2
  provider: ^6.1.5
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.2.1
  permission_handler: ^12.0.0+1
  timezone: ^0.10.1
  android_intent_plus: ^5.3.0
  firebase_core: ^3.15.2
  firebase_ai: ^2.0.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.11
  google_sign_in: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#42a5f5"
  image: lib/assets/logo.png
  android: true
  ios: true
  web: true

flutter_icons:
  android: true
  image_path: "lib/assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/Reminders.png
    - lib/assets/schedule.png
    - lib/assets/notify.png